<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<title>github-card</title>
		<style>
			body {
				font-family:
					-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
				margin: 0;
				padding: 40px 16px;
			}
			h2 {
				margin: 36px 0 8px;
				text-align: center;
				font-size: 14px;
				font-weight: 600;
				color: #57606a;
			}
			h2 code {
				background: #eaeef2;
				padding: 1px 6px;
				border-radius: 5px;
			}
			.profile {
				display: flex;
				flex-wrap: wrap;
				justify-content: center;
				gap: 28px;
			}
		</style>
	</head>
	<body>
		<h2>Default</h2>
		<div class="profile">
			<github-card data-user="rocktimsaikia"></github-card>
			<github-card data-user="benawad" data-theme="dark"></github-card>
		</div>

		<h2>Custom accent — set <code>--gh-accent</code> on the element</h2>
		<div class="profile">
			<github-card
				data-user="sindresorhus"
				style="--gh-accent: #6366f1"
			></github-card>
			<github-card
				data-user="gaearon"
				data-theme="dark"
				style="--gh-accent: #22c55e"
			></github-card>
		</div>

		<script type="module" src="../dist/index.js"></script>
	</body>
</html>
